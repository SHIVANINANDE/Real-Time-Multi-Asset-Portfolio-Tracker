name: Enterprise CI Pipeline

# Trigger automatically upon pushed commits or Pull Requests mapping to Main branch.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build-backend:
    name: Backend - Spring Boot 3 Tests & Container
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Test Output (Maven)
        # Using the standard Maven test execution phase to unit test Spring contexts and constraints
        run: cd portfolio-tracker && chmod +x mvnw && ./mvnw clean test

      - name: Build and Lint Frontend
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './portfolio-frontend/package-lock.json'
      
      - name: Install Node Modules
        run: cd portfolio-frontend && npm ci
        
      # Using npm run build checks JSX linting internally via Vite constraints, guaranteeing operational health
      - name: Build Frontend Application
        run: cd portfolio-frontend && npm run build

      - name: Docker Container Regression Validation
        # Validates that Dockerfiles can be successfully built against current codebase artifacts
        run: |
          docker compose build
