version: '3.8'

services:
  # ==================================
  # Relational Database: PostgreSQL 15
  # ==================================
  postgres:
    image: postgres:15-alpine
    container_name: portfolio-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Health checks ensure dependent microservices only boot once the DB is explicitly ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-network

  # ==================================
  # Message Broker: Apache Kafka (KRaft mode)
  # ==================================
  kafka:
    image: bitnami/kafka:3.5.1
    container_name: portfolio-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - portfolio-network

  # ==================================
  # Phase 3: Observability (Prometheus)
  # ==================================
  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: portfolio-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - portfolio-network

  # ==================================
  # Backend: Spring Boot Tracker
  # ==================================
  backend:
    build:
      context: ./portfolio-tracker
      dockerfile: Dockerfile
    container_name: portfolio-backend
    ports:
      - "8080:8080"
    environment:
      # Directing DB and Kafka connections to internal Docker network domains
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/portfolio_db
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-myuser}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # Inject JWT Secret via environment for Enterprise-grade Security Config
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      postgres:
        condition: service_healthy # Will not boot until Postgres hits full readiness
      kafka:
        condition: service_started
    networks:
      - portfolio-network

  # ==================================
  # Frontend: React Dashboard
  # ==================================
  frontend:
    build:
      context: ./portfolio-frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
